name: Nightly G-Sec Ingestion & Calibration

on:
  schedule:
    # Run daily at 14:00 UTC (7:30 PM IST), shortly after typical FBIL daily publication time
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    # Allows manual trigger of the ingestion job from the GitHub Actions UI

jobs:
  trigger-ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Backend Ingestion Endpoint
        run: |
          echo "Triggering ingestion on deployed backend..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.API_BASE_URL }}/api/v1/internal/ingestion/trigger" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_SERVICE_KEY }}" \
            --retry 3 --retry-delay 5)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ] 2>/dev/null; then
            echo "::error::Backend returned HTTP $HTTP_CODE: $BODY"
            exit 1
          fi
        
      - name: Report Status
        if: failure()
        run: |
          echo "Error: Ingestion run failed. Check backend logs and GHA logs."
