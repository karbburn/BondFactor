name: Fetch NSE Yield Data

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Defaults to latest available.'
        required: false

jobs:
  fetch-yields:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install curl_cffi

      - name: Fetch WDM yields
        id: fetch
        continue-on-error: true
        run: python backend/ingestion/nse_zcyc_csv_fetcher.py
        env:
          PYTHONPATH: backend

      - name: Commit CSV
        if: steps.fetch.outcome == 'success'
        run: |
          CSV=$(ls -t backend/data/manual_yields_*.csv 2>/dev/null | head -1)
          if [ -z "$CSV" ]; then
            echo "No CSV found"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "$CSV"
          git diff --cached --quiet || git commit -m "Add yield data"
          git push
