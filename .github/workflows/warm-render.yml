name: Keep Render API Warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit health endpoint
        run: |
          curl -sf https://bondfactor-api.onrender.com/ || exit 1
          echo "Render API ping successful at $(date -u)"
