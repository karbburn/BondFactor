name: Fetch NSE Yield Data

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Defaults to previous trading day.'
        required: false

jobs:
  fetch-yields:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install curl_cffi

      - name: Fetch WDM yields
        id: fetch
        continue-on-error: true
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="${{ github.event.inputs.date }}"
          fi
          python backend/ingestion/nse_zcyc_csv_fetcher.py $ARGS
          # Find the CSV that was just created
          CSV=$(ls -t backend/data/manual_yields_*.csv 2>/dev/null | head -1)
          if [ -n "$CSV" ]; then
            echo "csv=$CSV" >> "$GITHUB_OUTPUT"
          fi
        env:
          PYTHONPATH: backend

      - name: Commit CSV
        if: steps.fetch.outcome == 'success' && steps.fetch.outputs.csv != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "${{ steps.fetch.outputs.csv }}"
          git diff --cached --quiet || git commit -m "Add yield data $(date -u +%Y-%m-%d)"
          git push
